<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Dice Hero - Phaser</title>
    <style>
      /* === 像素字体 · Fusion Pixel 12px（中文 + 英文双段）=== */
      @font-face {
        font-family: 'FusionPixel';
        src: url('/fonts/fusion-pixel-12px-monospaced-zh_hans.woff2') format('woff2');
        font-display: block;
        font-weight: 400;
        font-style: normal;
        unicode-range: U+4E00-9FFF, U+3000-303F, U+FF00-FFEF, U+2000-206F, U+3400-4DBF, U+20000-2A6DF;
      }
      @font-face {
        font-family: 'FusionPixel';
        src: url('/fonts/fusion-pixel-12px-monospaced-latin.woff2') format('woff2');
        font-display: block;
        font-weight: 400;
        font-style: normal;
        unicode-range: U+0000-024F, U+0300-036F, U+0400-04FF, U+1E00-1EFF, U+2100-214F;
      }
      /* === 备用字体 · 艾薇薇点阵体（中文主字，原版备用，暂不激活）=== */
      @font-face {
        font-family: 'AaWeiWei';
        src: url('/fonts/AaWeiWeiDianZhenTi-2.ttf') format('truetype');
        font-display: block;
        font-weight: 400;
        font-style: normal;
      }

      html, body { margin: 0; padding: 0; background: #1a1a1a; overflow: hidden; width: 100%; height: 100%; font-family: 'FusionPixel', sans-serif; }
      /* Phaser ScaleManager（mode: FIT + autoCenter: CENTER_BOTH）会自己处理 canvas 位置与缩放。
         #game 不能再用 flex 居中 —— 否则 canvas 会被 flex 二次位移，Phaser 的 getBoundingClientRect
         与实际 pointer DOM 坐标错位，导致自定义 hitArea 的点击判定全部偏移（ClassSelectScene 卡片
         在 y=220/376/532 偏离中心较远时最明显，近似于"完全点不到"）。
         只保留全屏占位 + position:relative 让 Phaser 绝对定位 canvas 到正确位置。 */
      #game { width: 100vw; height: 100vh; position: relative; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
